version: 2

sources:
  - name: bigquery_source
    schema: staging

    tables:
      - name: orders

models:
    - name: first_transformation
      description: "First transformation layer"
      columns:
          - name: order_id
            description: "The primary key for this table"
            tests:
                - unique
                - not_null
      config:
            materialized: table
            alias: orders_rpt
